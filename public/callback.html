<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auth Callback</title>
  <style>
    :root {
      --bg: #f5f3ef;
      --surface: #e8e4dc;
      --surface-inset: #d9d4c9;
      --text: #2c2c2c;
      --text-muted: #6b6b6b;
      --sage: #c4d4a7;
      --sage-dark: #8a9a6d;
      --blue: #a7c4d4;
      --mauve: #d4c4bc;
      --mauve-dark: #a89890;
      --amber: #d4c4a7;
      --amber-dark: #a89887;
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 16px;
      --shadow-sm: 0 2px 4px rgba(44, 44, 44, 0.08);
      --shadow-md: 0 4px 12px rgba(44, 44, 44, 0.12);
      --shadow-lg: 0 8px 24px rgba(44, 44, 44, 0.15);
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 2rem;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .container {
      max-width: 700px;
      text-align: center;
      background: var(--surface);
      padding: var(--radius-lg);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--surface-inset);
    }
    
    h1 {
      font-size: 3rem;
      margin-bottom: 0.5rem;
      animation: bounce 0.6s ease-in-out;
    }
    
    @keyframes bounce {
      0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-20px); }
      60% { transform: translateY(-10px); }
    }
    
    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 3px solid var(--sage);
      margin: 1.5rem auto;
      display: none;
      object-fit: cover;
      box-shadow: var(--shadow-md);
    }
    
    .avatar.show {
      display: block;
    }
    
    p {
      font-size: 1.1rem;
      line-height: 1.6;
      margin: 0.8rem 0;
      color: var(--text);
    }
    
    .success { color: var(--sage-dark); font-weight: 600; }
    .nym-name { 
      color: var(--text); 
      font-size: 1.4rem; 
      margin: 1rem 0;
      font-weight: 600;
    }
    .payment-code { 
      color: var(--text-muted); 
      font-size: 0.85rem; 
      word-break: break-all;
      font-family: 'Courier New', monospace;
      margin: 0.5rem 0;
      background: var(--bg);
      padding: 0.8rem;
      border-radius: var(--radius-sm);
      border: 1px solid var(--surface-inset);
    }
    .countdown { 
      color: var(--text); 
      font-size: 1.1rem;
      font-weight: 500;
      margin: 1.5rem 0;
    }
    
    .spinner {
      display: inline-block;
      width: 40px;
      height: 40px;
      border: 4px solid var(--surface-inset);
      border-top-color: var(--sage);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 1.5rem auto;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .return-btn {
      background: var(--sage);
      color: var(--text);
      border: none;
      padding: 1rem 2rem;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 1.5rem;
      font-weight: 600;
      text-decoration: none;
      display: inline-block;
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-sm);
      transition: all 0.2s ease;
    }
    
    .return-btn:hover {
      background: var(--sage-dark);
      box-shadow: var(--shadow-md);
      transform: translateY(-1px);
    }
    
    .error { color: var(--mauve-dark); }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container" id="container">
    <h1 id="status-icon">⏳</h1>
    <p id="status-text" class="success">Verifying authentication...</p>
    <div class="spinner" id="spinner"></div>
    
    <div id="success-content" class="hidden">
      <img id="avatar" class="avatar" alt="Paynym Avatar">
      <p class="nym-name" id="nym-name"></p>
      <p class="payment-code" id="payment-code"></p>
      <p class="countdown">
        Redirecting to terminal in <span id="countdown-timer">10</span> seconds...
      </p>
      <a href="/auth" class="return-btn">Return to Terminal Now</a>
    </div>
    
    <div id="error-content" class="hidden">
      <p class="error">❌ Authentication Failed</p>
      <p style="color: var(--text-muted);">Invalid signature or expired challenge</p>
      <a href="/auth" class="return-btn">Return to Auth Page</a>
    </div>
  </div>

  <script>
    const NONCE_PARAM = 'nonce';
    const COUNTDOWN_SECONDS = 10;
    
    // Get nonce from URL
    const urlParams = new URLSearchParams(window.location.search);
    const nonce = urlParams.get(NONCE_PARAM);
    
    if (!nonce) {
      showError('Missing nonce parameter');
      return;
    }
    
    console.log('🔍 Verifying authentication for nonce:', nonce);
    
    // Poll for auth status
    let attempts = 0;
    const maxAttempts = 20; // 10 seconds at 500ms intervals
    const pollInterval = 500;
    
    const pollAuthStatus = async () => {
      try {
        const response = await fetch(`/check-auth/${nonce}`);
        const data = await response.json();
        
        console.log('📊 Auth status:', data);
        
        if (data.status === 'verified') {
          showSuccess(data);
          return;
        }
        
        if (data.status === 'invalid') {
          showError('Invalid or expired authentication');
          return;
        }
        
        // Still pending, continue polling
        attempts++;
        if (attempts >= maxAttempts) {
          showError('Authentication timeout');
          return;
        }
        
        setTimeout(pollAuthStatus, pollInterval);
        
      } catch (error) {
        console.error('❌ Polling error:', error);
        showError('Failed to verify authentication');
      }
    };
    
    const showSuccess = (data) => {
      console.log('✅ Authentication verified:', data);
      
      // Hide spinner, show success content
      document.getElementById('spinner').classList.add('hidden');
      document.getElementById('status-text').textContent = 'Authentication Successful!';
      document.getElementById('status-icon').textContent = '✅';
      
      const successContent = document.getElementById('success-content');
      successContent.classList.remove('hidden');
      
      // Display nym name
      if (data.nym) {
        document.getElementById('nym-name').textContent = data.nym;
      }
      
      // Display payment code
      if (data.paymentCode) {
        document.getElementById('payment-code').textContent = data.paymentCode;
      }
      
      // Fetch and display avatar
      fetchPaynymAvatar(data.nym);
      
      // Start countdown
      startCountdown();
    };
    
    const fetchPaynymAvatar = async (nym) => {
      try {
        const response = await fetch('/api/paynym/lookup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nym })
        });
        
        if (response.ok) {
          const data = await response.json();
          
          // Get primary payment code for avatar
          const primaryCode = data.codes && data.codes.length > 0 
            ? data.codes[0].code 
            : null;
          
          if (primaryCode) {
            const avatarUrl = `https://paynym.rs/${primaryCode}/avatar`;
            console.log('🖼️  Avatar URL:', avatarUrl);
            
            const avatarImg = document.getElementById('avatar');
            avatarImg.src = avatarUrl;
            avatarImg.classList.add('show');
            
            // Handle avatar load error
            avatarImg.onerror = () => {
              console.log('⚠️  Failed to load avatar');
              avatarImg.classList.remove('show');
            };
          }
        }
      } catch (error) {
        console.error('❌ Failed to fetch Paynym details:', error);
      }
    };
    
    const showError = (message) => {
      console.error('❌ Error:', message);
      
      // Hide spinner, show error content
      document.getElementById('spinner').classList.add('hidden');
      document.getElementById('status-text').textContent = message;
      document.getElementById('status-icon').textContent = '❌';
      document.getElementById('status-text').classList.add('error');
      
      const errorContent = document.getElementById('error-content');
      errorContent.classList.remove('hidden');
    };
    
    const startCountdown = () => {
      let seconds = COUNTDOWN_SECONDS;
      const timerElement = document.getElementById('countdown-timer');
      
      const countdown = setInterval(() => {
        seconds--;
        timerElement.textContent = seconds;
        
        if (seconds <= 0) {
          clearInterval(countdown);
          console.log('🔄 Redirecting to /auth');
          window.location.href = '/auth';
        }
      }, 1000);
    };
    
    // Start polling
    pollAuthStatus();
  </script>
</body>
</html>
