<!DOCTYPE html>
<html lang="en">
  <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paynym Explorer - BIP47 Terminal</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <a href="/" class="back-button">Back to Terminal</a>
    
    <div class="header">
      <h1>PAYNYM EXPLORER</h1>
      <div class="header-nav">
        <div class="status-led"></div>
        <span style="font-size: 0.75rem; font-weight: 500; color: var(--text-muted);">SYSTEM: ●</span>
      </div>
    </div>
    
    <p class="subtitle">Search and explore Paynym identities</p>
    
    <div class="search-section">
      <label class="search-label" style="display: block; margin-bottom: var(--space-sm); font-size: 0.9rem; font-weight: 500; color: var(--text);">Enter Payment Code, NymID, or NymName:</label>
      <div class="search-input-wrapper">
        <input 
          type="text" 
          id="searchInput"
          placeholder="PM8T... or nymName or nymID"
          onkeypress="if(event.key==='Enter') searchPaynym()"
        >
        <span class="search-icon">🔍</span>
      </div>
      <button class="primary" style="width: 100%; margin-top: var(--space-md);" id="searchBtn" onclick="searchPaynym()">
        Search Paynyms
      </button>
    </div>
    
    <div id="resultsContainer">
      <!-- Results will be populated here -->
    </div>
    
    <div id="emptyState" class="result-section" style="text-align: center; padding: var(--space-2xl);">
      <div style="font-size: 3rem; margin-bottom: var(--space-md);">🔍</div>
      <p style="color: var(--text-muted);">Enter a payment code, nymID, or nymName to explore</p>
    </div>
    
    <div class="footer">
      <div class="footer-text">Data provided by <a href="https://paynym.rs" target="_blank" style="color: var(--blue);">paynym.rs</a></div>
      <div class="footer-text">Privacy is a fundamental human right</div>
    </div>
  </div>

  <script>
    async function searchPaynym() {
      const input = document.getElementById('searchInput');
      const btn = document.getElementById('searchBtn');
      const resultsContainer = document.getElementById('resultsContainer');
      const emptyState = document.getElementById('emptyState');
      
      const query = input.value.trim();
      if (!query) return;
      
      // Show loading state
      btn.disabled = true;
      btn.innerHTML = '<span class="loading-spinner"></span> Searching...';
      emptyState.style.display = 'none';
      resultsContainer.classList.add('visible');
      resultsContainer.innerHTML = `
        <div class="result-section" style="text-align: center; padding: var(--space-2xl);">
          <div class="loading">
            <div class="loading-spinner"></div>
            <div style="color: var(--text-muted);">Searching Paynym database...</div>
          </div>
        </div>
      `;
      
      try {
        const response = await fetch('/api/paynym/lookup', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ nym: query })
        });
        
        const data = await response.json();
        
        if (!response.ok) {
          throw new Error(data.error || 'Paynym not found');
        }
        
        displayResults(data);
      } catch (error) {
        resultsContainer.innerHTML = `
          <div class="result-section" style="text-align: center; padding: var(--space-xl);">
            <div style="font-size: 2rem; margin-bottom: var(--space-md);">❌</div>
            <div style="color: var(--mauve-dark); font-weight: 500;">${error.message}</div>
          </div>
        `;
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Search Paynyms';
      }
    }
    
    // Store current followers data for expand functionality
    let currentFollowers = [];
    
    async function displayResults(data) {
      const resultsContainer = document.getElementById('resultsContainer');
      
      // Build payment codes HTML
      const codesHtml = data.codes.map(code => `
        <div class="payment-code-item">
          <div style="flex: 1;">
            <div class="code-text" style="font-size: 0.85rem;">${code.code}</div>
            <div style="font-size: 0.75rem; color: var(--text-muted); margin-top: var(--space-xs);">
              ${code.segwit ? '⚡ Segwit enabled' : 'Legacy'}
            </div>
          </div>
          <span class="status-pill ${code.claimed ? 'success' : 'pending'}">
            ${code.claimed ? 'Claimed ●' : 'Unclaimed'}
          </span>
        </div>
      `).join('');
      
      // Calculate total stats
      const totalFollowing = data.following ? data.following.length : 0;
      const totalFollowers = data.followers ? data.followers.length : 0;
      const totalCodes = data.codes ? data.codes.length : 0;
      
      // Use first code for avatar
      const primaryCode = data.codes && data.codes.length > 0 ? data.codes[0].code : '';
      const avatarUrl = primaryCode ? `https://paynym.rs/${primaryCode}/avatar` : '';
      
      // Build followers section (will be populated async)
      let followersHtml = '';
      if (totalFollowers > 0) {
        followersHtml = `
          <div style="margin-bottom: var(--space-xl);">
            <h3 style="margin-bottom: var(--space-md);">Followers (${totalFollowers})</h3>
            <div id="followersGrid" class="followers-grid">
              <div style="grid-column: 1 / -1; text-align: center; padding: var(--space-lg);">
                <div class="loading-spinner"></div>
                <div style="color: var(--text-muted); margin-top: var(--space-sm);">Loading followers...</div>
              </div>
            </div>
            <div id="expandedContent" style="display: none;"></div>
            ${totalFollowers > 8 ? `<button id="expandBtn" class="secondary" style="width: 100%;" onclick="toggleFollowers()">Show all ${totalFollowers} followers</button>` : ''}
          </div>
        `;
      }
      
      resultsContainer.innerHTML = `
        <div class="result-section">
          <div style="display: flex; align-items: center; gap: var(--space-lg); margin-bottom: var(--space-xl);">
            <div class="avatar-container">
              <img src="${avatarUrl}" alt="Paynym Avatar" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22><rect width=%22100%22 height=%22100%22 fill=%22%23f5f3ef%22/><text x=%2250%22 y=%2255%22 font-size=%2240%22 text-anchor=%22middle%22>🎭</text></svg>'" style="width: 100%; height: 100%; border-radius: 50%;">
            </div>
            <div style="flex: 1;">
              <div class="nym-name" style="font-size: 1.5rem; font-weight: 600; color: var(--text);">${data.nymName || 'Unknown'}</div>
              <div class="nym-id code-text" style="color: var(--text-muted);">${data.nymID}</div>
            </div>
          </div>
          
          <div class="stats-grid">
            <div class="stat-box">
              <div class="stat-value">${totalCodes}</div>
              <div class="stat-label">Payment Codes</div>
            </div>
            <div class="stat-box">
              <div class="stat-value">${totalFollowers}</div>
              <div class="stat-label">Followers</div>
            </div>
            <div class="stat-box">
              <div class="stat-value">${totalFollowing}</div>
              <div class="stat-label">Following</div>
            </div>
          </div>
          
          ${followersHtml}
          
          <div>
            <h3 style="margin-bottom: var(--space-md);">Payment Codes</h3>
            <div class="payment-codes-list">
              ${codesHtml}
            </div>
          </div>
        </div>
      `;
      
      // Fetch follower details if there are followers
      if (totalFollowers > 0) {
        await fetchFollowerDetails(data.followers);
      }
    }
    
    async function fetchFollowerDetails(followers) {
      const nymIds = followers.map(f => f.nymId);
      
      try {
        const response = await fetch('/api/paynym/followers', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ nymIds })
        });
        
        const followerDetails = await response.json();
        currentFollowers = followerDetails;
        
        // Display first 8 followers
        displayFollowersGrid(followerDetails.slice(0, 8));
        
        // Prepare expanded content with all followers
        if (followerDetails.length > 8) {
          const expandedGrid = document.getElementById('expandedContent');
          expandedGrid.innerHTML = `<div class="followers-grid" style="margin-top: var(--space-lg);">${buildFollowersCards(followerDetails.slice(8))}</div>`;
        }
      } catch (error) {
        console.error('Error fetching follower details:', error);
        const grid = document.getElementById('followersGrid');
        if (grid) {
          grid.innerHTML = '<div style="grid-column: 1 / -1; text-align: center; padding: var(--space-lg); color: var(--mauve-dark);">Failed to load followers</div>';
        }
      }
    }
    
    function buildFollowersCards(followers) {
      return followers.map(follower => `
        <div class="follower-card" onclick="searchFollower('${follower.nymId}')" style="cursor: pointer;">
          <div class="follower-avatar">
            <img src="${follower.avatarUrl || 'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2260%22 height=%2260%22><rect width=%22100%22 height=%22100%22 fill=%22%23f5f3ef%22/><text x=%2250%22 y=%2255%22 font-size=%2230%22 text-anchor=%22middle%22>?</text></svg>'}" 
                 alt="${follower.nymName}"
                 onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2260%22 height=%2260%22><rect width=%22100%22 height=%22100%22 fill=%22%23f5f3ef%22/><text x=%2250%22 y=%2255%22 font-size=%2230%22 text-anchor=%22middle%22>?</text></svg>'" 
                 style="width: 100%; height: 100%; border-radius: 50%;">
          </div>
          <div class="follower-name">${follower.nymName}</div>
          <div class="follower-id code-text" style="font-size: 0.65rem; color: var(--text-muted);">${follower.nymId.substring(0, 10)}...</div>
        </div>
      `).join('');
    }
    
    function displayFollowersGrid(followers) {
      const grid = document.getElementById('followersGrid');
      if (grid) {
        grid.innerHTML = buildFollowersCards(followers);
      }
    }
    
    function toggleFollowers() {
      const expandedContent = document.getElementById('expandedContent');
      const expandBtn = document.getElementById('expandBtn');
      
      if (expandedContent.style.display === 'none') {
        expandedContent.style.display = 'grid';
        expandBtn.textContent = 'Show fewer followers';
      } else {
        expandedContent.style.display = 'none';
        expandBtn.textContent = `Show all ${currentFollowers.length} followers`;
      }
    }
    
    function searchFollower(nymId) {
      document.getElementById('searchInput').value = nymId;
      searchPaynym();
    }
  </script>
</body>
</html>
